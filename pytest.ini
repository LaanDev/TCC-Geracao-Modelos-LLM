[pytest]
# Configuração do pytest para o projeto TCC

# Diretório de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de execução
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Marcadores customizados
markers =
    unit: Testes unitários (rápidos, sem I/O externo)
    integration: Testes de integração (podem usar I/O)
    slow: Testes lentos (chamadas reais ao LLM)
    api: Testes de endpoints da API

# Configuração de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
