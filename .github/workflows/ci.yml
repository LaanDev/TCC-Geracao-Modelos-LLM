# =============================================================================
# GitHub Actions - CI/CD Pipeline
# TCC - API de Modelagem de Sistemas de Controle
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # Job: Lint e Verificação de Código
  # ===========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
      
      - name: Verificar formatação (Ruff)
        run: ruff check . --output-format=github
        continue-on-error: true
      
      - name: Type checking (MyPy)
        run: mypy --ignore-missing-imports *.py
        continue-on-error: true

  # ===========================================================================
  # Job: Testes Unitários
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configurar variáveis de ambiente
        run: |
          echo "GOOGLE_API_KEY=fake-key-for-testing" >> $GITHUB_ENV
          echo "LOG_LEVEL=WARNING" >> $GITHUB_ENV
      
      - name: Executar testes unitários
        run: |
          pytest tests/ -v -m "unit" --tb=short
      
      - name: Executar testes de API
        run: |
          pytest tests/ -v -m "api" --tb=short
      
      - name: Executar todos os testes com cobertura
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
      
      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Job: Build Docker
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tcc-api-modelagem:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verificar imagem
        run: |
          docker images | grep tcc-api-modelagem

  # ===========================================================================
  # Job: Verificação de Segurança
  # ===========================================================================
  security:
    name: Security Check
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Verificar vulnerabilidades (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

  # ===========================================================================
  # Job: Notificação de Sucesso
  # ===========================================================================
  notify:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: always()
    
    steps:
      - name: Status do Pipeline
        run: |
          echo "Pipeline concluído!"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security: ${{ needs.security.result }}"
